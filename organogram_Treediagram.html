            --node-stroke: #2563eb;
            --link-color: #94a3b8;
            --highlight-bg: #fde047;
            --highlight-stroke: #ca8a04;

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #93c5fd;
            --btn-bg: #3b82f6;

            --node-stroke: #60a5fa;
            --link-color: #475569;
            --highlight-bg: #eab308;
            --highlight-stroke: #fef08a;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); margin: 0; overflow: hidden; transition: 0.3s; }
        .ui-panel { position: fixed; top: 20px; left: 20px; background: var(--panel-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 1000; border-left: 5px solid var(--btn-bg); }
        .search-box { margin-bottom: 15px; display: flex; gap: 5px; }
        input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; width: 180px; background: var(--panel-bg); color: var(--text-main); }
        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; background: var(--btn-bg); color: var(--btn-text); transition: 0.2s; }
        .btn-toggle { position: fixed; top: 20px; right: 20px; z-index: 1001; background: #334155; color: white; padding: 10px; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 20px; }
        .node circle { stroke: var(--node-stroke); stroke-width: 2px; fill: var(--node-fill); cursor: pointer; }
        .node text { font-size: 11px; font-weight: 600; fill: var(--text-main); pointer-events: none; }
        .link { fill: none; stroke: var(--link-color); stroke-width: 1.5px; stroke-opacity: 0.6; }
        #canvas { width: 100vw; height: 100vh; cursor: grab; }
        .highlight circle { fill: var(--highlight-bg) !important; stroke: var(--highlight-stroke) !important; stroke-width: 4px; }
        .highlight text { fill: var(--text-main) !important; font-size: 13px; font-weight: bold; }
        h3 { margin: 0 0 10px 0; font-size: 15px; color: var(--text-sub); }

        const svg = d3.select("#canvas");
        const g = svg.append("g");
        
        const zoom = d3.zoom().scaleExtent([0.01, 3]).on("zoom", (e) => g.attr("transform", e.transform));
        svg.call(zoom);

        const treemap = d3.tree().nodeSize([130, 260]); 
        let root = d3.hierarchy(treeData);
        root.x0 = window.innerWidth / 2;
        root.y0 = 50;

        if(root.children) root.children.forEach(collapse);

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById("themeBtn");
            if (body.getAttribute("data-theme") === "dark") {
                body.removeAttribute("data-theme");
                btn.innerText = "🌙";
            } else {
                body.setAttribute("data-theme", "dark");
                btn.innerText = "☀️";
            }
        }

        function update(source) {
            const nodes = treemap(root).descendants();
            const links = root.links();
            nodes.forEach(d => d.y = d.depth * 210); 

            const node = g.selectAll(".node").data(nodes, d => d.id || (d.id = Math.random()));
            
            const nodeEnter = node.enter().append("g")
                .attr("class", d => "node" + (d.highlight ? " highlight" : ""))
                .attr("transform", d => `translate(${source.x0},${source.y0})`)
                .on("click", (e, d) => { d.highlight = false; toggle(d); update(d); });

            nodeEnter.append("circle").attr("r", 5);
            
            const text = nodeEnter.append("text").attr("dy", "0.35em").attr("text-anchor", "middle");
            text.each(function(d) {
                const lines = d.data.name.split('\n');
                lines.forEach((line, i) => {
                    d3.select(this).append("tspan").attr("x", 0).attr("dy", i === 0 ? "1.3em" : "1.2em").text(line);
                });
            });

            const nodeUpdate = nodeEnter.merge(node);
            nodeUpdate.attr("class", d => "node" + (d.highlight ? " highlight" : ""));
            nodeUpdate.transition().duration(500).attr("transform", d => `translate(${d.x},${d.y})`);
            nodeUpdate.select("circle").style("fill", d => d.highlight ? null : (d._children ? null : null));

            node.exit().transition().duration(500).attr("transform", d => `translate(${source.x},${source.y})`).remove();

            const link = g.selectAll(".link").data(links, d => d.target.id);
            const linkEnter = link.enter().insert("path", "g").attr("class", "link")
                .attr("d", d => { const o = {x: source.x0, y: source.y0}; return diagonal(o, o); });

            link.merge(linkEnter).transition().duration(500).attr("d", d => diagonal(d.source, d.target));
            link.exit().transition().duration(500).attr("d", d => diagonal(source, source)).remove();
            nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
        }

        function diagonal(s, t) { return `M${s.x},${s.y}C${s.x},${(s.y+t.y)/2} ${t.x},${(s.y+t.y)/2} ${t.x},${t.y}`; }
        function toggle(d) { if (d.children) { d._children = d.children; d.children = null; } else { d.children = d._children; d._children = null; } }
        function expand(d) { if (d._children) { d.children = d._children; d._children = null; } if (d.children) d.children.forEach(expand); }
        function collapse(d) { if (d.children) { d._children = d.children; d.children = null; } if (d._children) d._children.forEach(collapse); }

        function searchNode() {
            const term = document.getElementById("searchInput").value.toLowerCase();
            if (!term) return;

            expand(root);
            let found = null;
            root.descendants().forEach(d => {
                d.highlight = false;
                if (d.data.name.toLowerCase().includes(term)) {
                    d.highlight = true;
                    found = d;
                }
            });

            update(root);
            if (found) {
                const transform = d3.zoomIdentity.translate(window.innerWidth/2 - found.x, 120 - found.y).scale(1);
                svg.transition().duration(750).call(zoom.transform, transform);
            }
        }

        window.expandAll = () => { expand(root); update(root); };
        window.collapseAll = () => { 
            root.descendants().forEach(d => d.highlight = false);
            if(root.children) root.children.forEach(collapse); 
            update(root); 
            svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity.translate(window.innerWidth/2, 50).scale(0.5));
        };

        svg.call(zoom.transform, d3.zoomIdentity.translate(window.innerWidth/2, 50).scale(0.5));
        update(root);
