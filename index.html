
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Force Directory</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 25px; font-weight: 600; }
        .controls { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; align-items: center; }
        input, select { padding: 10px; border: 1px solid #ced4da; border-radius: 6px; flex: 1; min-width: 180px; font-size: 14px; }
        .btn-clear { padding: 10px 20px; background-color: #dc3545; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-clear:hover { background-color: #c82333; }
        .table-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid #dee2e6; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 1100px; }
        th { background-color: #1a73e8; color: white; padding: 15px; text-align: left; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 10; }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; vertical-align: top; font-size: 14px; color: #4a5568; }
        tr:hover { background-color: #f7fafc; }
        .contact-info { display: block; font-size: 12px; color: #718096; margin-top: 3px; font-family: monospace; }
        .id-badge { font-size: 10px; background: #edf2f7; color: #4a5568; padding: 2px 5px; border-radius: 4px; margin-right: 5px; border: 1px solid #cbd5e0; }
        .member-block { margin-bottom: 12px; }
        .member-block:not(:last-child) { border-bottom: 1px dashed #e2e8f0; padding-bottom: 8px; }
        .role-label { font-size: 10px; font-weight: bold; color: #1a73e8; text-transform: uppercase; display: block; margin-bottom: 2px; }
    
        .floating-tree-btn {
            position: fixed;
            top: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background-color: #1a73e8;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-decoration: none;
            z-index: 2000;
            transition: transform 0.2s, background-color 0.2s;
        }
        .floating-tree-btn:hover {
            background-color: #1557b0;
            transform: scale(1.1);
        }
        /* SVG Tree Icon inside the button */
        .tree-icon {
            width: 30px;
            height: 30px;
            fill: white;
        }

    
        /* Dark Mode Variables */
        :root {
            --bg-color: #f0f2f5;
            --cont-bg: white;
            --text-color: #1a73e8;
            --table-text: #333;
            --ctrl-bg: #f8f9fa;
        }
        body.dark-mode {
            --bg-color: #121212;
            --cont-bg: #1e1e1e;
            --text-color: #bb86fc;
            --table-text: #e0e0e0;
            --ctrl-bg: #2d2d2d;
            background-color: var(--bg-color) !important;
        }
        body.dark-mode .container { background: var(--cont-bg); color: var(--table-text); }
        body.dark-mode h1 { color: var(--text-color); }
        body.dark-mode .controls { background: var(--ctrl-bg); border-color: #444; }
        body.dark-mode input, body.dark-mode select { background: #333; color: white; border-color: #555; }
        body.dark-mode table { background: #252525; }
        body.dark-mode th { background-color: #333; color: #bb86fc; }
        body.dark-mode td { border-bottom-color: #333; color: var(--table-text); }
        body.dark-mode tr:hover { background-color: #2a2a2a; }
        body.dark-mode .contact-info { color: #aaa; }
        
        .dark-mode-toggle {
            position: fixed;
            top: 25px;
            right: 100px; /* To the left of the Tree button */
            width: 45px;
            height: 45px;
            background-color: #333;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 2000;
            transition: 0.3s;
            border: none;
        }
        body.dark-mode .dark-mode-toggle { background-color: #f0f2f5; color: #333; }

    </style>
</head>

        function init() {
            const mSelect = document.getElementById('managerFilter');
            const tSelect = document.getElementById('townFilter');
            const mkSelect = document.getElementById('marketFilter');
            
            const managers = [...new Set(rawData.map(d => d.mgr))].filter(Boolean).sort();
            const towns = [...new Set(rawData.map(d => d.town))].filter(Boolean).sort();
            const markets = [...new Set(rawData.map(d => d.market))].filter(Boolean).sort();

            managers.forEach(m => { mSelect.add(new Option(m, m)); });
            towns.forEach(t => { tSelect.add(new Option(t, t)); });
            markets.forEach(mk => { mkSelect.add(new Option(mk, mk)); });

            renderTable(rawData);
        }

        function createStaffHTML(role, name, id, phone) {
            if (!name) return '<div class="member-block"><span style="color:#cbd5e0; font-style:italic;">N/A</span></div>';
            return `
                <div class="member-block">
                    <span class="role-label">${role}</span>
                    <strong>${name}</strong>
                    <span class="contact-info">
                        <span class="id-badge">ID: ${id || '---'}</span> ${phone}
                    </span>
                </div>
            `;
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            data.forEach(item => {
                const row = document.createElement('tr');
                
                let supCell = createStaffHTML('Supervisor 1', item.sup1, item.sup1_id, item.sup1_num);
                if (item.sup2) supCell += createStaffHTML('Supervisor 2', item.sup2, item.sup2_id, item.sup2_num);

                let tssCell = createStaffHTML('TSS 1', item.tss1, item.tss1_id, item.tss1_num);
                if (item.tss2) tssCell += createStaffHTML('TSS 2', item.tss2, item.tss2_id, item.tss2_num);

                row.innerHTML = `
                    <td>
                        <strong>${item.dist_name}</strong><br>
                        <span class="contact-info">Code: ${item.dist_code}</span>
                    </td>
                    <td>
                        ${item.town}<br>
                        <span class="contact-info" style="color:#1a73e8; font-weight:bold;">${item.market}</span>
                    </td>
                    <td>
                        <strong>${item.mgr}</strong><br>
                        <span class="contact-info"><span class="id-badge">ID: ${item.mgr_id}</span> ${item.mgr_num}</span>
                    </td>
                    <td>${supCell}</td>
                    <td>${tssCell}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function filterData() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const m = document.getElementById('managerFilter').value;
            const t = document.getElementById('townFilter').value;
            const mk = document.getElementById('marketFilter').value;

            const filtered = rawData.filter(item => {
                const searchStr = Object.values(item).join(' ').toLowerCase();
                return searchStr.includes(s) &&
                       (!m || item.mgr === m) &&
                       (!t || item.town === t) &&
                       (!mk || item.market === mk);
            });
            renderTable(filtered);
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('managerFilter').value = '';
            document.getElementById('townFilter').value = '';
            document.getElementById('marketFilter').value = '';
            renderTable(rawData);
        }

        init();
    
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('sun').style.display = isDark ? 'block' : 'none';
            document.getElementById('moon').style.display = isDark ? 'none' : 'block';
        }

    </script>
